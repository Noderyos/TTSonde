<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }
        .topbar {
            height: 48px;
            background: #222;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        .topbar a {
            color: #fff;
            text-decoration: none;
            margin-right: 16px;
        }
        .content {
            padding: 16px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="/">Main</a>
    <a href="/map">Map</a>
    <a href="/config">Config</a>
</div>

<div class="content">
    <h1>Main page</h1>
    <form action="/" method="POST">
        <label for="sonde">Radiosonde</label>
        <select id="sonde" name="sonde">
            <option value="m20">M20</option>
        </select>
        <br>
        <label for="freq">Frequency</label>
        <input type="number" min="400000000" max="500000000" value="405000000" name="freq" id="freq">
        <br>
        <input type="submit" value="Update">
    </form>
</div>

</body>
</html>
